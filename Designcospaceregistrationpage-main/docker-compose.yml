services:
  db:
    image: postgres:16-alpine
    profiles:
      - internal-db
    environment:
      POSTGRES_DB: cospace_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cospace_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${DB_NAME:-ITSS_Nhat}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      JWT_SECRET: ${JWT_SECRET:-change-this-compose-secret-with-at-least-32-chars}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:5173}
      MAIL_FROM: ${MAIL_FROM:-no-reply@cospace.local}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
