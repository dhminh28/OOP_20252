services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cospace_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cospace_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/cospace_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-compose-secret-with-at-least-32-chars
      CORS_ALLOWED_ORIGIN: http://localhost:5173
      MAIL_FROM: no-reply@cospace.local
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
